<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbollsverkstan – Bokning</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f4;
      color: #1f2a1f;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      color: #2f5d3a;
    }

    h3 {
      margin-bottom: 8px;
      color: #2f5d3a;
    }

    p {
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfd8cf;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 18px;
      background: #2f5d3a;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    button:hover {
      background: #264b2f;
    }

    .success {
      margin-top: 18px;
      padding: 14px;
      background: #e9f7ed;
      color: #1f5c2f;
      border-radius: 10px;
      display: none;
    }

    .error {
      margin-top: 18px;
      padding: 14px;
      background: #fdeaea;
      color: #a12626;
      border-radius: 10px;
      display: none;
    }

    .training-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      margin-bottom: 18px;
    }

    .spots {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .full {
      color: #a12626;
      font-weight: bold;
    }

    .small {
      color: #5f6f5f;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Fotbollsverkstan</h1>
      <h2>Boka öppen träning</h2>
      <p>Fyll i barnets namn, mailadress och välj träning. Max 20 platser per grupp.</p>

      <label for="name">Barnets namn</label>
      <input id="name" type="text" placeholder="Skriv namn" />

      <label for="email">Mailadress</label>
      <input id="email" type="email" placeholder="Skriv mailadress" />

      <label for="time">Välj träning</label>
      <select id="time"></select>

      <button type="button" onclick="bookTraining()">Boka plats</button>

      <div id="successMessage" class="success"></div>
      <div id="errorMessage" class="error"></div>
      <div class="small">När bokningen gått igenom visas en bekräftelse här på sidan.</div>
    </div>

    <div id="trainingBoxes"></div>
  </div>

  <script>
    const maxSpots = 20;
    // HÄR ÄR DIN URL FRÅN GOOGLE
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzbSP4X5CEw9SuK9XBlJ9HLD_WQGWjQ0EEWy-A6Oio3zNc__DzUUx_wU1qNugNUIj4JQQ/exec";

    const trainings = [
      {
        id: "pass1",
        date: "2026-04-16",
        day: "Torsdag",
        time: "17:00–18:00",
        group: "Öppen träning F18 F19"
      },
      {
        id: "pass2",
        date: "2026-04-19",
        day: "Söndag",
        time: "10:00–11:00",
        group: "Öppen träning P/F 2020–2021"
      },
      {
        id: "pass3",
        date: "2026-04-19",
        day: "Söndag",
        time: "15:15–16:15",
        group: "Öppen träning F15 F16 F17"
      }
    ];

    function getTrainingLabel(training) {
      return `${training.date} | ${training.day} ${training.time} | ${training.group}`;
    }

    // Hämtar bokningar från Google Sheets
    async function fetchBookings() {
      try {
        const response = await fetch(scriptUrl);
        const counts = await response.json();
        
        trainings.forEach(training => {
          const booked = counts[training.id] || 0;
          const remaining = maxSpots - booked;
          const spotsElement = document.getElementById(`spots-${training.id}`);
          
          if (remaining <= 0) {
            spotsElement.innerHTML = '<span class="full">Fullbokat</span>';
          } else {
            spotsElement.textContent = 'Platser kvar: ' + remaining;
          }
        });
      } catch (error) {
        console.error("Kunde inte hämta bokningar", error);
      }
    }

    function renderTrainings() {
      const select = document.getElementById("time");
      const boxes = document.getElementById("trainingBoxes");
      select.innerHTML = '<option value="">Välj träning</option>';
      boxes.innerHTML = "";

      trainings.forEach((training) => {
        const label = getTrainingLabel(training);
        const option = document.createElement("option");
        option.value = training.id;
        option.textContent = label;
        select.appendChild(option);

        const box = document.createElement("div");
        box.className = "training-box";
        box.innerHTML = `
          <h3>${label}</h3>
          <div class="spots" id="spots-${training.id}">Laddar platser...</div>
        `;
        boxes.appendChild(box);
      });
      
      fetchBookings();
    }

    async function bookTraining() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const selectedTrainingId = document.getElementById("time").value;
      const successMessage = document.getElementById("successMessage");
      const errorMessage = document.getElementById("errorMessage");

      successMessage.style.display = "none";
      errorMessage.style.display = "none";

      if (!name || !email || !selectedTrainingId) {
        errorMessage.textContent = "Fyll i barnets namn, mailadress och välj träning.";
        errorMessage.style.display = "block";
        return;
      }

      const selectedTraining = trainings.find(t => t.id === selectedTrainingId);
      const trainingLabel = getTrainingLabel(selectedTraining);

      try {
        // Vi skickar datan till Google
        await fetch(scriptUrl, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            name: name,
            email: email,
            trainingId: selectedTraining.id,
            trainingDate: selectedTraining.date,
            trainingDay: selectedTraining.day,
            trainingTime: selectedTraining.time,
            trainingGroup: selectedTraining.group,
            trainingLabel: trainingLabel,
            bookingCreatedAt: new Date().toISOString()
          }),
        });

        successMessage.textContent = "Tack! Din bokning är registrerad.";
        successMessage.style.display = "block";
        
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("time").value = "";

        // Uppdatera siffrorna direkt
        fetchBookings();
        
      } catch (error) {
        errorMessage.textContent = "Något gick fel.";
        errorMessage.style.display = "block";
      }
    }

    renderTrainings();
  </script>
</body>
</html>
