<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbollsverkstan – Bokning</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7f4; color: #1f2a1f; }
    .container { max-width: 760px; margin: 40px auto; padding: 20px; }
    .card { background: white; border-radius: 18px; padding: 24px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); margin-bottom: 24px; }
    h1 { margin-top: 0; font-size: 32px; }
    h2 { margin-top: 0; font-size: 22px; color: #2f5d3a; }
    p { line-height: 1.5; }
    label { display: block; margin-top: 14px; margin-bottom: 6px; font-weight: bold; }
    input, select { width: 100%; padding: 12px; border: 1px solid #cfd8cf; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    button { margin-top: 18px; background: #2f5d3a; color: white; border: none; padding: 14px 18px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; }
    button:hover { background: #264b2f; }
    .success { margin-top: 18px; padding: 14px; background: #e9f7ed; color: #1f5c2f; border-radius: 10px; display: none; }
    .error { margin-top: 18px; padding: 14px; background: #fdeaea; color: #a12626; border-radius: 10px; display: none; }
    .training-box { background: #ffffff; border-radius: 16px; padding: 18px; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06); margin-bottom: 18px; }
    .full { color: #a12626; font-weight: bold; }
    .small { color: #5f6f5f; font-size: 14px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Fotbollsverkstan</h1>
      <h2>Boka öppen träning</h2>
      <p>Fyll i barnets namn, mailadress och välj träning.</p>

      <label for="name">Barnets namn</label>
      <input id="name" type="text" placeholder="Skriv namn" />

      <label for="email">Mailadress</label>
      <input id="email" type="email" placeholder="Skriv mailadress" />

      <label for="time">Välj träning</label>
      <select id="time"></select>

      <button type="button" onclick="bookTraining()">Boka plats</button>

      <div id="successMessage" class="success"></div>
      <div id="errorMessage" class="error"></div>
      <div class="small">Bekräftelse visas här efter bokning.</div>
    </div>
    <div id="trainingBoxes"></div>
  </div>

  <script>
    // 1. DIN GOOGLE-LÄNK
    const scriptUrl = "https://script.google.com/macros/s/AKfycbw73_GqKyibQs4YRvaYn96MLqX59J5sUxUaqzkWCkJshoyghxai3BHk-6mQJ5_mIFnfrw/exec";

    // 2. VECKANS PASS
    const trainings = [
      { id: "v17_pass1", date: "2026-04-23", day: "Torsdag", time: "17:00–18:00", group: "Öppen träning F18 F19", limit: 20 },
      { id: "v17_pass2", date: "2026-04-26", day: "Söndag", time: "10:00–11:00", group: "Öppen träning P/F 2020–2021", limit: 20 },
      { id: "v17_pass3", date: "2026-04-26", day: "Söndag", time: "15:15–16:15", group: "Öppen träning F15 F16 F17", limit: 20 },
      { id: "v17_pass4", date: "2026-04-26", day: "Söndag", time: "17:00-18:00", group: "Plusträning 2013 gr 1", limit: 14 },
      { id: "v17_pass5", date: "2026-04-26", day: "Söndag", time: "18:00-19:00", group: "Plusträning 2013 gr 2", limit: 14 }
    ];

    function getTrainingLabel(t) {
      return `${t.date} | ${t.day} ${t.time} | ${t.group}`;
    }

    async function fetchBookings() {
      try {
        const response = await fetch(scriptUrl);
        const counts = await response.json();
        trainings.forEach(t => {
          const booked = counts[t.id] || 0;
          const remaining = t.limit - booked;
          const el = document.getElementById(`spots-${t.id}`);
          if (el) {
            el.innerHTML = remaining <= 0 ? '<span class="full">Fullbokat</span>' : 'Platser kvar: ' + remaining;
          }
        });
      } catch (e) { console.error(e); }
    }

    function renderTrainings() {
      const select = document.getElementById("time");
      const boxes = document.getElementById("trainingBoxes");
      select.innerHTML = '<option value="">Välj träning</option>';
      boxes.innerHTML = "";

      trainings.forEach((t) => {
        const label = getTrainingLabel(t);
        const opt = document.createElement("option");
        opt.value = t.id;
        opt.textContent = label;
        select.appendChild(opt);

        const div = document.createElement("div");
        div.className = "training-box";
        div.innerHTML = `<h3>${label}</h3><div id="spots-${t.id}">Laddar platser...</div>`;
        boxes.appendChild(div);
      });
      fetchBookings();
    }

    async function bookTraining() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const id = document.getElementById("time").value;
      if (!name || !email || !id) return alert("Fyll i alla fält!");

      const t = trainings.find(x => x.id === id);
      try {
        await fetch(scriptUrl, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({
            name, email, trainingId: t.id, trainingDate: t.date,
            trainingLabel: getTrainingLabel(t), bookingCreatedAt: new Date().toISOString()
          })
        });
        document.getElementById("successMessage").style.display = "block";
        document.getElementById("successMessage").textContent = "Tack! Bokningen är klar.";
        fetchBookings();
      } catch (e) { alert("Något gick fel!"); }
    }

    renderTrainings();
  </script>
</body>
</html>
